  <text x="224" y="356" fill="#79c0ff" font-family="monospace" font-size="10">SELECT  relationship_manager,</text>
  <text x="224" y="370" fill="#79c0ff" font-family="monospace" font-size="10">        ROUND(AVG(pd_estimate) * 100, 3)  AS avg_pd_pct,</text>
  <text x="224" y="384" fill="#79c0ff" font-family="monospace" font-size="10">        ROUND(AVG(raroc) * 100, 2)         AS avg_raroc_pct,  COUNT(*) AS n_loans</text>

